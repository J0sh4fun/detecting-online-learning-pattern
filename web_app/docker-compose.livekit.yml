services:
  livekit:
    image: livekit/livekit-server:latest
    container_name: focus-livekit
    command: --config /etc/livekit/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./backend/livekit.yaml:/etc/livekit/livekit.yaml:ro
    restart: unless-stopped

