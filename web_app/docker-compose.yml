services:

  backend:
    build: ./backend
    image: focus-backend-image
    container_name: focus-backend
    ports:
      - "8000:8000"
    environment:
      - APP_JWT_SECRET=dev-secret-change-me
      - APP_JWT_ALGO=HS256
      - APP_JWT_EXP_MINUTES=240
      - CORS_ORIGINS=*
      - LIVEKIT_URL=ws://localhost:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=9f1c4d8a6b2e7f0c3a5d1e9b4c8f2a7d
      - MAX_STUDENTS_PER_ROOM=50
      - MIN_INGEST_INTERVAL_SEC=0.75
      - SCORE_LOW_THRESHOLD=55
      - VERIFY_DISCREPANCY_THRESHOLD=25
      - MODEL_PIPELINE_DIR=/model_pipeline
    volumes:
      - ./backend:/app
      - ../model_pipeline:/model_pipeline:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build: ./frontend
    image: focus-frontend-image
    container_name: focus-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_API_WS_BASE=ws://localhost:8000
      - VITE_POSTURE_MODEL_URL=/models/best_posture_model.onnx
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
